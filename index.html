<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen">
        <div class="login-container">
            <h1>Sistema de Controle</h1>
            <h2>Acesso Restrito</h2>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="login-usuario">Usuário</label>
                    <input type="text" id="login-usuario" required>
                </div>
                
                <div class="input-group">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" required>
                </div>
                
                <p id="mensagem-erro" class="erro"></p>
                
                <button type="submit" id="btn-login">Entrar</button>
            </form>
        </div>
    </div>
    
    <div id="main-content" style="display: none;">
        <header>
            <nav>
                <span id="welcome-message">Bem-vindo(a), [Nome do Usuário]</span>
                <button id="logout-button">Sair</button>
            </nav>
        </header>
        
        <main>
            <h2>Controle de Estoque e Movimentação</h2>
            
            <div class="form-container">
                <h3>Lançar Movimentação</h3>
                <form id="stock-form">
                    
                    <div class="input-group">
                        <label for="movimento-tipo">Tipo de Movimento</label>
                        <select id="movimento-tipo" required>
                            <option value="" disabled selected>Selecione</option>
                            <option value="ENTRADA">1. Recebimento (ENTRADA)</option>
                            <option value="SAÍDA">2. Uso/Retirada (SAÍDA)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="movimento-sku">Código / SKU</label>
                        <input type="text" id="movimento-sku" required placeholder="Ex: FITA-ADM-005">
                    </div>

                    <div class="input-group">
                        <label for="movimento-descricao">Descrição do Item</label>
                        <input type="text" id="movimento-descricao" required placeholder="Ex: Fita Adesiva Transparente Durex">
                    </div>

                    <div class="input-group">
                        <label for="movimento-quantidade">Quantidade</label>
                        <input type="number" id="movimento-quantidade" min="1" required placeholder="Ex: 10">
                    </div>
                    
                    <div class="input-group">
                        <label for="movimento-observacoes">Observações</label>
                        <textarea id="movimento-observacoes" rows="2" placeholder="Ex: Compra da NF 1234 ou Retirada para escritório B"></textarea>
                    </div>
                    
                    <p id="mensagem-estoque" class="erro"></p>

                    <button type="submit" id="btn-movimentar">Registrar Movimentação</button>
                </form>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
